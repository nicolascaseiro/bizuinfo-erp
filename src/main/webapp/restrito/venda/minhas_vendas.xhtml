<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Minhas Vendas</title>

    <h:outputStylesheet library="css" name="global.css"/>
    <h:outputStylesheet library="css" name="produto.css"/>
</h:head>

<h:body>

    <h:form id="form">

        <div class="topbar">

            <p:button value="Dashboard"
                      icon="pi pi-home"
                      outcome="#{sessionScope.usuario.role eq 'ADMIN'
                      ? '/restrito/dashboard/dashboard_admin'
                      : sessionScope.usuario.role eq 'GERENTE'
                      ? '/restrito/dashboard/dashboard_gerente'
                      : '/restrito/dashboard/dashboard_funcionario'}"/>

            <p:menuButton value="Vendas"
                          icon="pi pi-shopping-cart">

                <p:menuitem value="Nova Venda"
                            icon="pi pi-plus"
                            outcome="/restrito/venda/consultar_produtos_venda.xhtml"/>

                <p:menuitem value="Minhas Vendas"
                            icon="pi pi-list"
                            outcome="/restrito/venda/minhas_vendas.xhtml"/>

            </p:menuButton>

            <div class="spacer"/>

            <p:menuButton icon="pi pi-user">

                <p:menuitem value="Meu Perfil"
                            outcome="/restrito/usuario/perfil_usuario.xhtml"/>

                <p:menuitem value="Sair"
                            icon="pi pi-sign-out"
                            action="#{loginBean.sair}"/>

            </p:menuButton>

        </div>

        <p:panel header="Relatório de Vendas - Filtros">

            <h:panelGrid columns="6" cellpadding="5">

                <p:outputLabel value="Data Inicial"/>
                <p:datePicker value="#{minhasVendasBean.dataInicial}"
                              pattern="dd/MM/yyyy"
                              showIcon="true"/>

                <p:outputLabel value="Data Final"/>
                <p:datePicker value="#{minhasVendasBean.dataFinal}"
                              pattern="dd/MM/yyyy"
                              showIcon="true"/>

                <p:commandButton value="Filtrar"
                                 icon="pi pi-search"
                                 action="#{minhasVendasBean.filtrar}"
                                 update="form"/>

                <p:commandButton value="Limpar"
                                 icon="pi pi-times"
                                 action="#{minhasVendasBean.carregar}"
                                 update="form"/>

            </h:panelGrid>

        </p:panel>

        <p:panel header="Exportação">

            <h:panelGrid columns="2" cellpadding="5">

                <p:commandButton value="Exportar PDF"
                                 icon="pi pi-file-pdf"
                                 ajax="false"
                                 action="#{minhasVendasBean.exportarPDF}"/>

                <p:commandButton value="Exportar CSV"
                                 icon="pi pi-file-excel"
                                 ajax="false"
                                 action="#{minhasVendasBean.exportarCSV}"/>

            </h:panelGrid>

        </p:panel>

        <p:panel header="Histórico de Vendas">

            <p:dataTable id="tabelaVendas"
                         value="#{minhasVendasBean.vendas}"
                         var="v"
                         emptyMessage="Nenhuma venda encontrada">

                <p:column headerText="ID">
                    #{v.id}
                </p:column>

                <p:column headerText="Data">
                    #{v.dataVendaFormatada}
                </p:column>

                <p:column headerText="Itens">
                    #{v.itens.size()}
                </p:column>

                <p:column headerText="Total">
                    <h:outputText value="#{v.valorTotal}">
                        <f:convertNumber type="currency"
                                         currencySymbol="R$"
                                         locale="pt_BR"/>
                    </h:outputText>
                </p:column>

                <p:column headerText="Forma Pagamento">
                    #{empty v.pagamento ? '-' : v.pagamento.formaPagamento}
                </p:column>

                <p:column headerText="Ações">

                    <p:button value="Ver Recibo"
                              icon="pi pi-eye"
                              outcome="/restrito/venda/recibo_venda.xhtml">

                        <f:param name="vendaId" value="#{v.id}"/>
                    </p:button>

                </p:column>

            </p:dataTable>

        </p:panel>

    </h:form>

</h:body>
</html>
