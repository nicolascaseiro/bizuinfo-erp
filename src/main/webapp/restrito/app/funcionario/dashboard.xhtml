<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Dashboard - BizuInfo</title>

    <h:outputStylesheet library="css" name="estilo.css"/>

    <style>

        html, body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .topbar {
            flex: 0 0 auto;
            position: sticky;
            top: 0;
            z-index: 1000;

            background: #ffffff;
            padding: 12px;
            border-bottom: 1px solid #ddd;

            display: flex;
            align-items: center;
            gap: 10px;
        }

        .spacer {
            flex: 1;
        }

        .status-ativo {
            color: green;
            font-weight: bold;
        }

        .status-inativo {
            color: red;
            font-weight: bold;
        }

        .content-area {
            padding: 15px;
        }

        .table-container {
            max-height: 65vh;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

    </style>

</h:head>

<h:body>

    <h:form id="formDashboard">

        <div class="topbar">

            <h:outputText value="ERP BizuInfo"
                          style="font-size:18px;font-weight:bold;" />

            <div class="spacer"></div>

            <p:menuButton icon="pi pi-user" style="margin-left:auto">

                <p:menuitem value="Meu Perfil"
                            outcome="/restrito/app/perfil/perfil_usuario.xhtml?faces-redirect=true"/>

                <p:menuitem value="Sair"
                            icon="pi pi-sign-out"
                            action="#{loginBean.sair}"/>

            </p:menuButton>

        </div>

        <p:panel header="Dashboard Funcionário"
                 styleClass="card-cadastro">

            <h:panelGrid columns="1"
                         styleClass="full-width"
                         cellpadding="7">

                <h:outputText
                        value="Bem-vindo ao sistema!"
                        style="font-size:18px; font-weight:bold; text-align:center;" />

                <p:divider />

                <h:outputText
                        value="Nome: #{loginBean.usuarioLogado.nome}" />

                <h:outputText
                        value="Email: #{loginBean.usuarioLogado.email}" />

                <h:outputText
                        value="Perfil: #{loginBean.usuarioLogado.role}" />

            </h:panelGrid>

        </p:panel>

    </h:form>

</h:body>
</html>
