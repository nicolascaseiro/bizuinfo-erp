<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

<h:head>

    <title>Dashboard Admin - BizuInfo</title>

    <h:outputStylesheet library="css" name="estilo.css"/>

    <style>

        html, body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .topbar {
            flex: 0 0 auto;
            position: sticky;
            top: 0;
            z-index: 1000;

            background: #ffffff;
            padding: 12px;
            border-bottom: 1px solid #ddd;

            display: flex;
            align-items: center;
            gap: 10px;
        }

        .spacer {
            flex: 1;
        }

        .status-ativo {
            color: green;
            font-weight: bold;
        }

        .status-inativo {
            color: red;
            font-weight: bold;
        }

        .content-area {
            padding: 15px;
        }

        .table-container {
            max-height: 65vh;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

    </style>

</h:head>

<h:body>

    <h:form id="formDashboard">

        <div class="topbar">

            <p:commandButton value="Dashboard"
                             icon="pi pi-home"
                             action="#{usuarioAdminBean.irParaDashboard}"
                             update=":formDashboard:conteudo"/>

            <p:commandButton value="Usuários"
                             icon="pi pi-users"
                             action="#{usuarioAdminBean.irParaUsuarios}"
                             update=":formDashboard:conteudo"/>

            <p:commandButton value="Logs"
                             icon="pi pi-book"
                             action="#{usuarioAdminBean.irParaLogs}"
                             update=":formDashboard:conteudo"/>

            <div class="spacer"></div>

            <p:commandButton value="Sair"
                             icon="pi pi-sign-out"
                             ajax="false"
                             action="#{loginBean.sair}"/>

        </div>

        <p:growl id="growl"
                 showDetail="true"
                 life="3000"/>

        <p:outputPanel id="conteudo"
                       styleClass="content-area">

            <!-- DASHBOARD -->
            <h:panelGroup rendered="#{usuarioAdminBean.abaAtiva == 0}">
                <p:panel header="Resumo Geral">
                    <h:panelGrid columns="1" cellpadding="8">
                        <h:outputText value="Bem-vindo, #{loginBean.usuarioLogado.nome}"
                                      style="font-size:18px;font-weight:bold"/>
                        <h:outputText value="Email: #{loginBean.usuarioLogado.email}"/>
                        <h:outputText value="Perfil: #{loginBean.usuarioLogado.role}"/>
                    </h:panelGrid>
                </p:panel>
            </h:panelGroup>

            <!-- USUÁRIOS -->
            <h:panelGroup rendered="#{usuarioAdminBean.abaAtiva == 1}">

                <p:panel header="Gestão de Usuários">

                  <div class="table-container">

                    <p:dataTable id="tabelaUsuarios"
                                 value="#{usuarioAdminBean.usuarios}"
                                 var="u"
                                 editable="true"
                                 editMode="row"
                                 emptyMessage="Nenhum usuário encontrado"
                                 sortMode="single">

                        <p:ajax event="rowEdit"
                                listener="#{usuarioAdminBean.salvar}"
                                update=":formDashboard:growl"/>

                        <p:column headerText="Nome"
                                  sortBy="#{u.nome}">
                            <p:cellEditor>
                                <f:facet name="output">
                                    <h:outputText value="#{u.nome}"/>
                                </f:facet>
                                <f:facet name="input">
                                    <p:inputText value="#{u.nome}" style="width:100%"/>
                                </f:facet>
                            </p:cellEditor>
                        </p:column>

                        <p:column headerText="Email"
                                  sortBy="#{u.email}">
                            <p:cellEditor>
                                <f:facet name="output">
                                    <h:outputText value="#{u.email}"/>
                                </f:facet>
                                <f:facet name="input">
                                    <p:inputText value="#{u.email}" style="width:100%"/>
                                </f:facet>
                            </p:cellEditor>
                        </p:column>

                        <p:column headerText="Perfil"
                                  sortBy="#{u.roleString}">
                            <p:cellEditor>
                                <f:facet name="output">
                                    <h:outputText value="#{u.roleString}"/>
                                </f:facet>
                                <f:facet name="input">
                                    <p:selectOneMenu value="#{u.roleString}"
                                                     disabled="#{loginBean.usuarioLogado.id == u.id}">
                                        <f:selectItem itemLabel="FUNCIONARIO" itemValue="FUNCIONARIO"/>
                                        <f:selectItem itemLabel="GERENTE" itemValue="GERENTE"/>
                                        <f:selectItem itemLabel="ADMIN" itemValue="ADMIN"/>
                                    </p:selectOneMenu>
                                </f:facet>
                            </p:cellEditor>
                        </p:column>

                        <p:column headerText="Status"
                                  sortBy="#{u.emailVerificado}">
                            <h:outputText value="#{u.emailVerificado ? 'ATIVO' : 'INATIVO'}"
                                          styleClass="#{u.emailVerificado ? 'status-ativo' : 'status-inativo'}"/>
                        </p:column>

                        <p:column style="width:120px">
                            <p:rowEditor/>
                        </p:column>

                        <p:column headerText="Excluir">
                            <p:commandButton icon="pi pi-trash"
                                             value="Excluir"
                                             process="@this"
                                             update=":formDashboard:growl"
                                             action="#{usuarioAdminBean.prepararExclusao(u)}"
                                             oncomplete="PF('dlgExcluir').show()"/>
                        </p:column>

                    </p:dataTable>
                  </div>

                </p:panel>

            </h:panelGroup>

            <!-- LOGS -->
            <h:panelGroup rendered="#{usuarioAdminBean.abaAtiva == 2}">

                <p:panel header="Logs de Auditoria">
                  <div class="table-container">
                    <p:dataTable value="#{logAuditoriaBean.logs}"
                                 var="l"
                                 emptyMessage="Nenhum log encontrado"
                                 sortMode="single">

                        <p:column headerText="Data/Hora"
                                  sortBy="#{l.dataHora}">
                            <h:outputText value="#{l.dataHoraFormatada}"/>
                        </p:column>

                        <p:column headerText="Ação"
                                  sortBy="#{l.acao}">
                            <h:outputText value="#{l.acao}"/>
                        </p:column>

                        <p:column headerText="Detalhe">
                            <h:outputText value="#{l.detalhe}"
                                          style="white-space: normal; word-break: break-word;"/>
                        </p:column>

                        <p:column headerText="Usuário"
                                  sortBy="#{l.usuarioResponsavel}">
                            <h:outputText value="#{l.usuarioResponsavel}"/>
                        </p:column>

                        <p:column headerText="IP Origem"
                                  sortBy="#{l.ipOrigem}">
                            <h:outputText value="#{l.ipOrigem}"/>
                        </p:column>

                    </p:dataTable>
                  </div>

                </p:panel>

            </h:panelGroup>

        </p:outputPanel>

        <p:confirmDialog widgetVar="dlgExcluir"
                         header="Confirmação"
                         message="Deseja realmente excluir este usuário?"
                         severity="warn">

            <p:commandButton value="Sim"
                             process="@this"
                             action="#{usuarioAdminBean.excluirSelecionado}"
                             update=":formDashboard:conteudo :formDashboard:growl"
                             oncomplete="PF('dlgExcluir').hide()"/>

            <p:commandButton value="Não"
                             type="button"
                             onclick="PF('dlgExcluir').hide()"/>

        </p:confirmDialog>

    </h:form>

</h:body>
</html>
