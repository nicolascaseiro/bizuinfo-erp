<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>

    <title>Logs de Auditoria - BizuInfo</title>

    <h:outputStylesheet library="css" name="estilo.css"/>

    <style>

        html, body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .topbar {
            flex: 0 0 auto;
            position: sticky;
            top: 0;
            z-index: 1000;

            background: #ffffff;
            padding: 12px;
            border-bottom: 1px solid #ddd;

            display: flex;
            align-items: center;
            gap: 10px;
        }

        .spacer {
            flex: 1;
        }

        .content-area {
            padding: 15px;
        }

        .table-container {
            max-height: 75vh;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

    </style>

</h:head>

<h:body>

    <h:form id="formLogs">

        <div class="topbar">

            <p:button value="Dashboard"
                      icon="pi pi-home"
                      outcome="/restrito/dashboard/dashboard_admin.xhtml"/>

            <p:button value="Usuários"
                      icon="pi pi-users"
                      outcome="/restrito/usuario/usuarios_admin.xhtml"/>

            <p:button value="Logs"
                      icon="pi pi-book"
                      outcome="/restrito/auditoria/logs.xhtml"/>

            <p:menuButton value="Produtos"
                          icon="pi pi-box">

                <p:menuitem value="Consultar Estoque"
                            outcome="/restrito/estoque/consultar_estoque.xhtml"/>

                <p:menuitem value="Gerenciar Categorias"
                            outcome="/restrito/produto/gerenciar_categorias.xhtml"/>

                <p:menuitem value="Gerenciar Estoque"
                            outcome="/restrito/estoque/gerenciar_estoque.xhtml"/>

            </p:menuButton>

            <div class="spacer"></div>

            <p:menuButton icon="pi pi-user">

                <p:menuitem value="Meu Perfil"
                            outcome="/restrito/usuario/perfil_usuario.xhtml"/>

                <p:menuitem value="Sair"
                            icon="pi pi-sign-out"
                            action="#{loginBean.sair}"/>

            </p:menuButton>

        </div>

        <div class="content-area">

            <p:panel header="Logs de Auditoria">

                <div class="table-container">

                    <p:dataTable value="#{logAuditoriaBean.logs}"
                                 var="l"
                                 emptyMessage="Nenhum log encontrado"
                                 sortMode="single">

                        <p:column headerText="Data/Hora"
                                  sortBy="#{l.dataHora}">

                            <h:outputText value="#{l.dataHoraFormatada}"/>

                        </p:column>

                        <p:column headerText="Ação"
                                  sortBy="#{l.acao}">

                            <h:outputText value="#{l.acao}"/>

                        </p:column>

                        <p:column headerText="Detalhe">

                            <h:outputText value="#{l.detalhe}"
                                          style="white-space: normal; word-break: break-word;"/>

                        </p:column>

                        <p:column headerText="Usuário"
                                  sortBy="#{l.usuarioResponsavel}">

                            <h:outputText value="#{l.usuarioResponsavel}"/>

                        </p:column>

                        <p:column headerText="IP Origem"
                                  sortBy="#{l.ipOrigem}">

                            <h:outputText value="#{l.ipOrigem}"/>

                        </p:column>

                    </p:dataTable>

                </div>

            </p:panel>

        </div>

    </h:form>

</h:body>
</html>
