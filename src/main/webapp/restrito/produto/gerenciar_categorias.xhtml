<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Gerenciar Categorias - BizuInfo ERP</title>

    <meta charset="UTF-8"/>

    <h:outputStylesheet library="css" name="global.css"/>
    <h:outputStylesheet library="css" name="produto.css"/>

</h:head>

<h:body>

    <h:form id="formCategorias">

        <p:growl id="growl" showDetail="true"/>

        <div class="topbar">

            <p:button value="Dashboard"
                      icon="pi pi-home"
                      outcome="/restrito/dashboard/dashboard_admin.xhtml"/>

            <p:menuButton value="Produtos"
                          icon="pi pi-box">

                <p:menuitem value="Consultar Estoque"
                            outcome="/restrito/estoque/consultar_estoque.xhtml"/>

                <p:menuitem value="Gerenciar Categorias"
                            outcome="/restrito/produto/gerenciar_categorias.xhtml"/>

                <p:menuitem value="Gerenciar Estoque"
                            outcome="/restrito/estoque/gerenciar_estoque.xhtml"/>

            </p:menuButton>

            <div class="spacer"> </div>

            <p:menuButton icon="pi pi-user">

                <p:menuitem value="Meu Perfil"
                            outcome="/restrito/usuario/perfil_usuario.xhtml"/>

                <p:menuitem value="Sair"
                            icon="pi pi-sign-out"
                            action="#{loginBean.sair}"/>

            </p:menuButton>

        </div>

        <p:panel header="Gestão de Categorias">

            <div class="container-tabela">

                <p:commandButton value="Nova Categoria"
                                 icon="pi pi-plus"
                                 action="#{categoriaBean.prepararNovaCategoria}"
                                 process="@this"
                                 update=":formNovaCategoria"
                                 oncomplete="PF('dlgNovaCategoria').show()"/>

                <p:dataTable value="#{categoriaBean.categorias}"
                             var="c"
                             emptyMessage="Nenhuma categoria cadastrada">

                    <p:column headerText="ID"
                              width="80"
                              style="text-align:center">

                        <h:outputText value="#{c.id}"/>

                    </p:column>

                    <p:column headerText="Nome">

                        <h:outputText value="#{c.nome}"/>

                    </p:column>

                    <p:column headerText="Ações"
                              width="220"
                              style="text-align:center">

                        <p:commandButton value="Editar"
                                         icon="pi pi-pencil"
                                         process="@this"
                                         action="#{categoriaBean.prepararEdicao(c)}"
                                         update=":formEditarCategoria"
                                         oncomplete="PF('dlgEditarCategoria').show()"/>

                        <p:spacer width="5"/>

                        <p:commandButton value="Excluir"
                                         icon="pi pi-trash"
                                         process="@this"
                                         action="#{categoriaBean.prepararExclusao(c)}"
                                         oncomplete="PF('dlgExcluirCategoria').show()"/>

                    </p:column>

                </p:dataTable>

            </div>

        </p:panel>

    </h:form>

    <p:dialog header="Nova Categoria"
              widgetVar="dlgNovaCategoria"
              modal="true">

        <h:form id="formNovaCategoria">

            <p:outputLabel value="Nome"/>

            <p:inputText value="#{categoriaBean.nomeNovaCategoria}"/>

            <br/><br/>

            <p:commandButton value="Salvar"
                             action="#{categoriaBean.salvarNovaCategoria}"
                             update=":formCategorias"
                             oncomplete="PF('dlgNovaCategoria').hide()"/>

            <p:commandButton value="Cancelar"
                             type="button"
                             onclick="PF('dlgNovaCategoria').hide()"/>

        </h:form>

    </p:dialog>

    <h:form id="formExcluirCategoria">

        <p:confirmDialog widgetVar="dlgExcluirCategoria"
                         header="Confirmação"
                         message="Deseja realmente excluir esta categoria?">

            <p:commandButton value="Sim"
                             action="#{categoriaBean.excluirSelecionada}"
                             update=":formCategorias"
                             oncomplete="PF('dlgExcluirCategoria').hide()"/>

            <p:commandButton value="Não"
                             type="button"
                             onclick="PF('dlgExcluirCategoria').hide()"/>

        </p:confirmDialog>

    </h:form>

    <p:dialog header="Editar Categoria"
              widgetVar="dlgEditarCategoria"
              modal="true">

        <h:form id="formEditarCategoria">

            <p:outputLabel value="Nome"/>

            <p:inputText value="#{categoriaBean.novoNomeCategoria}"/>

            <br/><br/>

            <p:commandButton value="Salvar"
                             action="#{categoriaBean.salvarEdicao}"
                             update=":formCategorias"
                             oncomplete="PF('dlgEditarCategoria').hide()"/>

        </h:form>

    </p:dialog>

</h:body>
</html>
