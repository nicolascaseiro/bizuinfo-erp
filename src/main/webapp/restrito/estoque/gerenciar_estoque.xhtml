<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Gerenciar Produtos - BizuInfo ERP</title>
    <meta charset="UTF-8"/>
    <h:outputStylesheet library="css" name="global.css"/>
    <h:outputStylesheet library="css" name="produto.css"/>
</h:head>

<h:body>
    <h:form id="formProdutos">
        <p:growl id="growl" showDetail="true"/>

        <p:confirmDialog global="true"
                         showEffect="fade"
                         hideEffect="fade">

            <p:commandButton value="Sim"
                             type="button"
                             styleClass="ui-confirmdialog-yes"
                             icon="pi pi-check"/>

            <p:commandButton value="Não"
                             type="button"
                             styleClass="ui-confirmdialog-no"
                             icon="pi pi-times"/>

        </p:confirmDialog>

        <div class="topbar">
            <p:button value="Dashboard"
                      icon="pi pi-home"
                      outcome="/restrito/dashboard/dashboard_admin.xhtml"/>


            <p:menuButton value="Produtos" icon="pi pi-box">
                <p:menuitem value="Gerenciar Categorias"
                            outcome="/restrito/produto/gerenciar_categorias.xhtml"/>
                <p:menuitem value="Gerenciar Estoque"
                            outcome="/restrito/estoque/gerenciar_estoque.xhtml"/>
            </p:menuButton>

            <p:menuButton value="Vendas"
                          icon="pi pi-shopping-cart">

                <p:menuitem value="Nova Venda"
                            icon="pi pi-plus"
                            outcome="/restrito/venda/consultar_produtos_venda.xhtml"/>

                <p:menuitem value="Minhas Vendas"
                            icon="pi pi-list"
                            outcome="/restrito/venda/minhas_vendas.xhtml"/>

            </p:menuButton>

            <div class="spacer"></div>

            <p:menuButton icon="pi pi-user" style="margin-left:auto">
                <p:menuitem value="Meu Perfil"
                            outcome="/restrito/usuario/perfil_usuario.xhtml"/>
                <p:menuitem value="Sair"
                            icon="pi pi-sign-out"
                            action="#{loginBean.sair}"/>
            </p:menuButton>
        </div>

        <p:panel header="Gestão de Estoque">
            <div class="container-tabela">
                <div class="barra-pesquisa">
                    <p:inputText id="filtro"
                                 value="#{estoqueBean.filtro}"
                                 placeholder="Pesquisar por produto ou categoria">

                        <p:ajax event="keyup"
                                listener="#{estoqueBean.filtrar}"
                                update="tabelaProdutos"/>

                    </p:inputText>
                </div>

                <p:commandButton value="Adicionar Produto"
                                 icon="pi pi-plus"
                                 type="button"
                                 onclick="PF('dlgNovoProduto').show()"/>

                <br/><br/>

                <p:dataTable id="tabelaProdutos"
                             value="#{estoqueBean.produtosFiltrados}" var="p"
                             emptyMessage="Nenhum produto encontrado. Verifique se o banco foi populado."
                             styleClass="p-mt-2">

                    <p:column headerText="ID" width="50" style="text-align: center;">
                        <h:outputText value="#{p.id}"/>
                    </p:column>

                    <p:column headerText="Produto">
                        <h:outputText value="#{p.nome}"/>
                    </p:column>

                    <p:column headerText="Categoria" style="text-align: center;">
                        <h:outputText
                                value="#{empty p.categoria or empty p.categoria.nome ? 'Sem Categoria' : p.categoria.nome}"/>
                    </p:column>

                    <p:column headerText="Estoque Atual" style="text-align: center;">
                        <h:outputText value="#{p.estoqueAtual}"
                                      style="font-weight: bold; color: #{p.estoqueAtual le p.estoqueMinimo ? 'red' : 'green'};"/>
                    </p:column>

                    <p:column headerText="Estoque Mínimo" width="150" style="text-align: center;">
                        <h:outputText value="#{p.estoqueMinimo}"/>
                    </p:column>

                    <p:column headerText="Ações" width="150" style="text-align: center;">
                        <p:commandButton icon="pi pi-box"
                                         value="Movimentar"
                                         style="width: 150px;"
                                         action="#{estoqueBean.prepararMovimentacao(p)}"
                                         update=":formDialogoMovimentacao"
                                         oncomplete="PF('dlgMovimentacao').show()"/>

                        <p:commandButton icon="pi pi-trash"
                                         value="Excluir"
                                         style="width: 150px; background:#e57373; border-color:#e57373;"
                                         action="#{estoqueBean.excluirProduto(p)}"
                                         update=":formProdutos:tabelaProdutos :formProdutos:growl">

                            <p:confirm header="Confirmação"
                                       message="Deseja excluir o produto #{p.nome}?"
                                       icon="pi pi-exclamation-triangle"/>

                        </p:commandButton>
                    </p:column>
                </p:dataTable>
            </div>
        </p:panel>
    </h:form>

    <p:dialog header="Movimentar Estoque" widgetVar="dlgMovimentacao" modal="true" resizable="false">
        <h:form id="formDialogoMovimentacao">
            <h:panelGrid columns="2" cellpadding="10">
                <h:outputText value="Produto Selecionado:" style="font-weight: bold;"/>
                <h:outputText
                        value="#{empty estoqueBean.produtoSelecionado ? '' : estoqueBean.produtoSelecionado.nome}"/>

                <h:outputText value="Quantidade (Valores negativos para saídas):"/>
                <p:spinner value="#{estoqueBean.quantidadeMovimentacao}"/>
            </h:panelGrid>
            <p:divider/>
            <div style="text-align: right; margin-top: 10px;">
                <p:commandButton value="Confirmar" icon="pi pi-check"
                                 action="#{estoqueBean.salvarMovimentacao}"
                                 update=":formProdutos :formProdutos:growl"
                                 oncomplete="PF('dlgMovimentacao').hide()"/>
            </div>
        </h:form>
    </p:dialog>

    <p:dialog header="Novo Produto"
              widgetVar="dlgNovoProduto"
              modal="true"
              resizable="false">

        <h:form id="formNovoProduto">

            <h:panelGrid columns="2"
                         cellpadding="10">

                <h:outputText value="Nome do Produto"/>
                <p:inputText value="#{produtoBean.produto.nome}"
                             placeholder="Nome do Produto"/>

                <h:outputText value="Preço"/>
                <p:inputNumber value="#{produtoBean.produto.preco}"
                               decimalPlaces="2"
                               symbol="R$ "
                               symbolPosition="p"/>

                <h:outputText value="Categoria"/>
                <p:selectOneMenu value="#{produtoBean.produto.categoria}"
                                 converter="categoriaConverter">
                    <f:selectItems value="#{categoriaBean.categorias}"
                                   var="c"
                                   itemLabel="#{c.nome}"
                                   itemValue="#{c}"/>
                </p:selectOneMenu>

                <h:outputText value="Fornecedor" />
                <p:selectOneMenu value="#{produtoBean.produto.fornecedor}"
                                 converter="fornecedorConverter">
                    <f:selectItems value="#{fornecedorBean.fornecedores}"
                                   var="f"
                                   itemLabel="#{f.nome}"
                                   itemValue="#{f}" />
                </p:selectOneMenu>

                <h:outputText value="Estoque Mínimo"/>
                <p:spinner value="#{produtoBean.produto.estoqueMinimo}"
                           min="0"
                           stepFactor="1"/>

                <h:outputText value="Estoque"/>
                <p:spinner value="#{produtoBean.produto.estoqueAtual}"
                           min="0"
                           stepFactor="1"/>

            </h:panelGrid>

            <p:divider/>

            <div style="text-align:right">

                <p:commandButton value="Salvar"
                                 action="#{produtoBean.salvar}"
                                 update=":formProdutos:tabelaProdutos :formProdutos:growl formNovoProduto"
                                 oncomplete="if (!args.validationFailed) PF('dlgNovoProduto').hide();" />

            </div>

        </h:form>

    </p:dialog>

</h:body>
</html>
