<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>

    <title>Dashboard Funcionário - BizuInfo</title>

    <h:outputStylesheet library="css" name="estilo.css"/>

    <style>

        html, body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .topbar {
            flex: 0 0 auto;
            position: sticky;
            top: 0;
            z-index: 1000;

            background: #ffffff;
            padding: 12px;
            border-bottom: 1px solid #ddd;

            display: flex;
            align-items: center;
            gap: 10px;
        }

        .spacer {
            flex: 1;
        }

        .content-area {
            padding: 15px;
        }

    </style>

</h:head>

<h:body>

    <h:form id="formDashboard">

        <div class="topbar">

            <p:commandButton value="Dashboard"
                             icon="pi pi-home"
                             outcome="/restrito/dashboard/dashboard_funcionario.xhtml"/>

            <div class="spacer"></div>

            <p:menuButton icon="pi pi-user">

                <p:menuitem value="Meu Perfil"
                            outcome="/restrito/usuario/perfil_usuario.xhtml"/>

                <p:menuitem value="Sair"
                            icon="pi pi-sign-out"
                            action="#{loginBean.sair}"/>

            </p:menuButton>

        </div>

        <p:outputPanel styleClass="content-area">

            <p:panel header="Resumo Geral">

                <h:panelGrid columns="1" cellpadding="8">

                    <h:outputText
                            value="Bem-vindo, #{loginBean.usuarioLogado.nome}"
                            style="font-size:18px;font-weight:bold"/>

                    <h:outputText
                            value="Email: #{loginBean.usuarioLogado.email}"/>

                    <h:outputText
                            value="Perfil: #{loginBean.usuarioLogado.role}"/>

                </h:panelGrid>

            </p:panel>

        </p:outputPanel>

    </h:form>

</h:body>
</html>
