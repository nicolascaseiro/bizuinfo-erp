<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>

    <title>Dashboard Admin - BizuInfo</title>
    <h:outputStylesheet library="css" name="global.css"/>
    <h:outputStylesheet library="css" name="usuarios.css"/>

</h:head>

<h:body>

    <h:form id="formDashboard">

        <div class="topbar">

            <p:button value="Dashboard"
                      icon="pi pi-home"
                      outcome="/restrito/dashboard/dashboard_admin.xhtml"/>

            <p:button value="Usuários"
                      icon="pi pi-users"
                      outcome="/restrito/usuario/usuarios_admin.xhtml"/>

            <p:button value="Logs"
                      icon="pi pi-book"
                      outcome="/restrito/auditoria/logs.xhtml"/>

            <p:menuButton value="Produtos"
                          icon="pi pi-box">

                <p:menuitem value="Gerenciar Categorias"
                            outcome="/restrito/produto/gerenciar_categorias.xhtml"/>

                <p:menuitem value="Gerenciar Estoque"
                            outcome="/restrito/estoque/gerenciar_estoque.xhtml"/>

            </p:menuButton>

            <p:menuButton value="Vendas"
                          icon="pi pi-shopping-cart">

                <p:menuitem value="Nova Venda"
                            icon="pi pi-plus"
                            outcome="/restrito/venda/consultar_produtos_venda.xhtml"/>

                <p:menuitem value="Minhas Vendas"
                            icon="pi pi-list"
                            outcome="/restrito/venda/minhas_vendas.xhtml"/>


            </p:menuButton>

            <p:menuButton value="Fornecedores"
                          icon="pi pi-truck">
                <p:menuitem value="Simulação de Compras"
                            outcome="/restrito/venda/simulacao_compras.xhtml"/>
                <p:menuitem value="Gerenciar Fornecedores"
                            outcome="/restrito/produto/gerenciar_fornecedores.xhtml"/>

            </p:menuButton>

            <div class="spacer"> </div>

            <p:menuButton icon="pi pi-user">

                <p:menuitem value="Meu Perfil"
                            outcome="/restrito/usuario/perfil_usuario.xhtml"/>

                <p:menuitem value="Sair"
                            icon="pi pi-sign-out"
                            action="#{loginBean.sair}"/>

            </p:menuButton>

        </div>

        <div class="content-area">

            <p:panel header="Resumo Geral">

                <!-- CARDS -->
                <h:panelGrid columns="3" cellpadding="10" styleClass="kpi-grid">

                    <p:panel header="Hoje" styleClass="kpi-card kpi-blue">
                        <h:outputText value="#{dashboardBean.faturamentoHoje}">
                            <f:convertNumber type="currency"
                                             currencySymbol="R$"
                                             maxFractionDigits="2"
                                             minFractionDigits="2"/>
                        </h:outputText>
                    </p:panel>

                    <p:panel header="Semana" styleClass="kpi-card kpi-green">
                        <h:outputText value="#{dashboardBean.faturamentoSemana}">
                            <f:convertNumber type="currency"
                                             currencySymbol="R$"
                                             maxFractionDigits="2"
                                             minFractionDigits="2"/>
                        </h:outputText>
                    </p:panel>

                    <p:panel header="Mês" styleClass="kpi-card kpi-purple">
                        <h:outputText value="#{dashboardBean.faturamentoMes}">
                            <f:convertNumber type="currency"
                                             currencySymbol="R$"
                                             maxFractionDigits="2"
                                             minFractionDigits="2"/>
                        </h:outputText>
                    </p:panel>

                </h:panelGrid>

                <br/>

                <!-- GRÁFICO PAGAMENTO -->
                <p:panel header="Valor Total por Forma de Pagamento">

                    <div style="width:500px;margin:auto;">

                        <p:pieChart model="#{dashboardBean.pagamentoChart}"
                                    width="500"
                                    height="500"/>

                    </div>

                </p:panel>

                <br/>

                <!-- GRÁFICO PRODUTOS -->
                <p:panel header="Produtos mais vendidos">

                    <p:barChart model="#{dashboardBean.produtosChart}" style="width:100%;height:300px"/>

                </p:panel>

            </p:panel>

        </div>

    </h:form>

</h:body>
</html>
