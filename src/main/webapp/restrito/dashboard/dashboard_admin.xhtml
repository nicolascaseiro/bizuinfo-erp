<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>

    <title>Dashboard Admin - BizuInfo</title>
    <h:outputStylesheet library="css" name="global.css"/>
    <h:outputStylesheet library="css" name="usuarios.css"/>

</h:head>

<h:body>

    <h:form id="formDashboard">

        <div class="topbar">

            <p:button value="Dashboard"
                      icon="pi pi-home"
                      outcome="/restrito/dashboard/dashboard_admin.xhtml"/>

            <p:button value="Usuários"
                      icon="pi pi-users"
                      outcome="/restrito/usuario/usuarios_admin.xhtml"/>

            <p:button value="Logs"
                      icon="pi pi-book"
                      outcome="/restrito/auditoria/logs.xhtml"/>

            <p:menuButton value="Produtos"
                          icon="pi pi-box">

                <p:menuitem value="Gerenciar Categorias"
                            outcome="/restrito/produto/gerenciar_categorias.xhtml"/>

                <p:menuitem value="Gerenciar Estoque"
                            outcome="/restrito/estoque/gerenciar_estoque.xhtml"/>

            </p:menuButton>

            <p:menuButton value="Vendas"
                          icon="pi pi-shopping-cart">

                <p:menuitem value="Nova Venda"
                            icon="pi pi-plus"
                            outcome="/restrito/venda/consultar_produtos_venda.xhtml"/>

                <p:menuitem value="Minhas Vendas"
                            icon="pi pi-list"
                            outcome="/restrito/venda/minhas_vendas.xhtml"/>

            </p:menuButton>

            <div class="spacer"> </div>

            <p:menuButton icon="pi pi-user">

                <p:menuitem value="Meu Perfil"
                            outcome="/restrito/usuario/perfil_usuario.xhtml"/>

                <p:menuitem value="Sair"
                            icon="pi pi-sign-out"
                            action="#{loginBean.sair}"/>

            </p:menuButton>

        </div>

        <div class="content-area">

            <p:panel header="Resumo Geral">

                <h:panelGrid columns="1" cellpadding="8">

                    <h:outputText value="Bem-vindo, #{loginBean.usuarioLogado.nome}"
                                  style="font-size:18px;font-weight:bold"/>

                    <h:outputText value="Email: #{loginBean.usuarioLogado.email}"/>

                    <h:outputText value="Perfil: #{loginBean.usuarioLogado.role}"/>

                </h:panelGrid>

            </p:panel>

        </div>

    </h:form>

</h:body>
</html>
